name: Devths-BE 운영용 CD 파이프라인

on:
  workflow_dispatch:
    inputs:
      ecr_name:
        description: 'ECR 이미지 태그 (예: 20260301_052438-06f0205)'
        required: true
        type: string
      deployment_comment:
        description: '배포 메모'
        required: false
        type: string
        default: 'Manual deployment from GitHub Actions'

env:
  # AWS 설정
  AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  ECR_TARGET_REPO: "devths/be-prod"
  S3_BUCKET: ${{ secrets.AWS_S3_BUCKET_PROD_V2 }}

  # CodeDeploy 설정
  CODEDEPLOY_APPLICATION: ${{ secrets.CODEDEPLOY_APPLICATION }}
  CODEDEPLOY_DEPLOYMENT_GROUP: ${{ secrets.CODE_DEPLOY_GROUP_NAME_PROD_V2 }}

  # Discord 설정
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_PROD_URL }}
  DISCORD_AVATAR_URL: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

jobs:
  # 승인 요청 알림 (즉시 실행)
  notify-approval-request:
    name: Notify Approval Request
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 브랜치 검증
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ 운영 배포는 main 브랜치에서만 실행 가능합니다."
            echo "현재 브랜치: ${{ github.ref_name }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi
          echo "✅ 브랜치 검증 완료: main"

      - name: Discord 승인 요청 알림
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: 'success'
          content: '@everyone'
          title: '🔔 운영 배포 승인 요청'
          description: |
            **배포 요청자**: ${{ github.actor }}
            **요청 시각**: ${{ github.event.created_at }}

            **🐳 Docker 이미지**: `${{ inputs.ecr_name }}`
            **🪣 S3 Key**: `BE/${{ github.ref_name }}/${{ inputs.ecr_name }}.zip`
            **💬 배포 메모**: ${{ inputs.deployment_comment }}
            **🌍 환경**: 🚀 운영(PROD)

            ⏳ **2단계 교차 승인 대기 중...**

            **승인 프로세스**:
            1️⃣ **1차 승인** (DevOps) → 2️⃣ **2차 승인** (TechLead) → 🚀 **배포 실행**

            **승인 방법**:
            1. [워크플로우 페이지](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})로 이동
            2. **Review deployments** 버튼 클릭
            3. 본인의 승인 단계 선택 후 **Approve and deploy** 클릭

            **⚠️ 주의**: 2명 모두 승인해야 배포가 시작됩니다.
          color: 16776960
          username: GitHub BE Prod Deploy Bot
          avatar_url: ${{ env.DISCORD_AVATAR_URL }}

  # 1차 승인
  first-approval:
    name: 1차 승인 (DevOps/TechLead)
    runs-on: ubuntu-22.04
    needs: [ notify-approval-request ]
    environment:
      name: production-approval-1
    steps:
      - name: 1차 승인 완료
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ 1차 승인 완료"
          echo "승인자: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Discord 1차 승인 완료 알림
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: 'success'
          content: '@everyone'
          title: '✅ 1차 승인 완료 (DevOps/TechLead)'
          description: |
            **1차 승인자**: ${{ github.actor }}
            **승인 시각**: ${{ github.event.head_commit.timestamp }}

            **🐳 Docker 이미지**: `${{ inputs.ecr_name }}`
            **💬 배포 메모**: ${{ inputs.deployment_comment }}
            **🌍 환경**: 🚀 운영(PROD)

            ⏳ **2차 승인 대기 중...**

            **다음 단계**: TechLead의 2차 승인이 필요합니다.
            **승인 방법**: [워크플로우 페이지](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})에서 **Review deployments** 버튼 클릭
          color: 65280
          username: GitHub BE Prod Deploy Bot
          avatar_url: ${{ env.DISCORD_AVATAR_URL }}

  # 2차 승인
  second-approval:
    name: 2차 승인 (TechLead)
    runs-on: ubuntu-22.04
    needs: [ first-approval ]
    environment:
      name: production-approval-2
    steps:
      - name: 2차 승인 완료
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ 2차 승인 완료 - 배포 시작 가능"
          echo "승인자: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Discord 2차 승인 완료 알림
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: 'success'
          title: '✅ 2차 승인 완료 (TechLead) - 배포 시작'
          content: '@everyone'
          description: |
            **2차 승인자**: ${{ github.actor }}
            **승인 시각**: ${{ github.event.head_commit.timestamp }}

            **🐳 Docker 이미지**: `${{ inputs.ecr_name }}`
            **💬 배포 메모**: ${{ inputs.deployment_comment }}
            **🌍 환경**: 🚀 운영(PROD)

            🚀 **모든 승인 완료! 배포가 1분 후, 자동으로 시작됩니다.**

            **진행 상황**: [워크플로우 페이지](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})에서 확인 가능
          color: 3066993
          username: GitHub BE Prod Deploy Bot
          avatar_url: ${{ env.DISCORD_AVATAR_URL }}

  # 운영 배포 (2차 승인 후 자동 실행)
  deploy-production:
    name: Production Deployment
    runs-on: ubuntu-22.04
    needs: [ second-approval ]
    environment:
      name: production
      url: https://www.devths.com
    outputs:
      deployment_id: ${{ steps.create.outputs.deployment_id }}
      status: ${{ steps.status.outputs.status }}
      error_message: ${{ steps.status.outputs.error_message }}
      status_download: ${{ steps.lifecycle.outputs.status_download }}
      status_app_start: ${{ steps.lifecycle.outputs.status_app_start }}
      status_validate: ${{ steps.lifecycle.outputs.status_validate }}
      error_step: ${{ steps.lifecycle.outputs.error_step }}

    steps:
      - name: S3 Key 구성
        id: s3_key
        run: |
          S3_KEY="BE/${{ github.ref_name }}/${{ inputs.ecr_name }}.zip"
          echo "s3_key=$S3_KEY" >> $GITHUB_OUTPUT
          echo "📦 S3 Key: $S3_KEY"

      - name: 배포 정보 확인
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Production Deployment Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🐳 Docker 이미지: ${{ inputs.ecr_name }}"
          echo "📦 S3 Key: ${{ steps.s3_key.outputs.s3_key }}"
          echo "🪣 S3 Bucket: ${{ env.S3_BUCKET }}"
          echo "🎯 Deployment Group: ${{ env.CODEDEPLOY_DEPLOYMENT_GROUP }}"
          echo "💬 Comment: ${{ inputs.deployment_comment }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ env.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: S3 아티팩트 존재 확인
        run: |
          echo "🔍 Checking if artifact exists in S3..."
          if aws s3 ls "s3://${{ env.S3_BUCKET }}/${{ steps.s3_key.outputs.s3_key }}" > /dev/null 2>&1; then
            echo "✅ Artifact found: s3://${{ env.S3_BUCKET }}/${{ steps.s3_key.outputs.s3_key }}"

            # 파일 크기 확인
            SIZE=$(aws s3 ls "s3://${{ env.S3_BUCKET }}/${{ steps.s3_key.outputs.s3_key }}" | awk '{print $3}')
            SIZE_MB=$(echo "scale=2; $SIZE/1024/1024" | bc)
            echo "📊 Artifact size: ${SIZE_MB}MB"
          else
            echo "❌ Artifact not found: s3://${{ env.S3_BUCKET }}/${{ steps.s3_key.outputs.s3_key }}"
            echo "💡 Please check the ECR tag and try again."
            exit 1
          fi

      - name: AWS CodeDeploy 배포 요청
        id: create
        run: |
          set -euo pipefail
          echo "🚀 CodeDeploy 배포를 시작합니다..."

          # 배포 아이디 조회
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APPLICATION }} \
            --deployment-group-name ${{ env.CODEDEPLOY_DEPLOYMENT_GROUP }} \
            --s3-location bucket=${{ env.S3_BUCKET }},key=${{ steps.s3_key.outputs.s3_key }},bundleType=zip \
            --description "Deploy Docker Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_TARGET_REPO }}:${{ inputs.ecr_name }} (${{ inputs.deployment_comment }})" \
            --query 'deploymentId' \
            --output text)

          # GITHUB_OUTPUT에 값 기록
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "✅ 배포 ID: $DEPLOYMENT_ID"

      - name: 배포 완료(헬스체크 포함)까지 대기
        id: wait
        run: |
          set -euo pipefail
          DEPLOYMENT_ID="${{ steps.create.outputs.deployment_id }}"
          echo "⏳ 배포 상태를 확인합니다 (ID: $DEPLOYMENT_ID)..."

          # 배포 완료까지 대기 (최대 3분)
          aws deploy wait deployment-successful \
            --deployment-id "$DEPLOYMENT_ID" \
            --cli-read-timeout 180

          echo "✅ CodeDeploy 배포가 성공적으로 완료되었습니다!"

      - name: 배포 상태 조회
        id: status
        if: always()
        run: |
          set -euo pipefail

          DEPLOYMENT_ID="${{ steps.create.outputs.deployment_id }}"
          if [ -z "${DEPLOYMENT_ID:-}" ]; then
            echo "status=UNKNOWN" >> $GITHUB_OUTPUT
            echo "error_message=Failed to create deployment (deployment_id missing)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 상태 및 에러 메시지 조회
          STATUS=$(aws deploy get-deployment --deployment-id "$DEPLOYMENT_ID" --query 'deploymentInfo.status' --output text)
          ERROR_MESSAGE=$(aws deploy get-deployment --deployment-id "$DEPLOYMENT_ID" --query 'deploymentInfo.errorInformation.message' --output text 2>/dev/null || true)

          if [ "${ERROR_MESSAGE:-}" = "None" ] || [ "${ERROR_MESSAGE:-}" = "null" ]; then
            ERROR_MESSAGE=""
          fi

          ERROR_MESSAGE_CLEAN=$(echo "${ERROR_MESSAGE:-}" | tr '\n' ' ' | head -c 400)

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "error_message=$ERROR_MESSAGE_CLEAN" >> $GITHUB_OUTPUT

          echo "📌 최종 상태: $STATUS"
          if [ -n "$ERROR_MESSAGE_CLEAN" ]; then
            echo "📌 에러: $ERROR_MESSAGE_CLEAN"
          fi

      - name: Lifecycle Event 상세 조회
        id: lifecycle
        if: always() && steps.create.outputs.deployment_id != ''
        run: |
          set -euo pipefail

          DEPLOYMENT_ID="${{ steps.create.outputs.deployment_id }}"

          # 인스턴스 ID 조회
          INSTANCE_ID=$(aws deploy list-deployment-instances --deployment-id "$DEPLOYMENT_ID" --query "instancesList[0]" --output text 2>/dev/null || echo "")

          if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
            # Lifecycle Event 조회
            EVENTS=$(aws deploy get-deployment-instance --deployment-id "$DEPLOYMENT_ID" --instance-id "$INSTANCE_ID" --query "instanceSummary.lifecycleEvents" 2>/dev/null || echo "[]")

            # 각 단계별 상태 추출
            STATUS_DOWNLOAD=$(echo "$EVENTS" | jq -r '.[] | select(.lifecycleEventName=="DownloadBundle") | .status' || echo "Unknown")
            STATUS_APP_START=$(echo "$EVENTS" | jq -r '.[] | select(.lifecycleEventName=="ApplicationStart") | .status' || echo "Unknown")
            STATUS_VALIDATE=$(echo "$EVENTS" | jq -r '.[] | select(.lifecycleEventName=="ValidateService") | .status' || echo "Unknown")

            echo "status_download=${STATUS_DOWNLOAD:-Unknown}" >> $GITHUB_OUTPUT
            echo "status_app_start=${STATUS_APP_START:-Unknown}" >> $GITHUB_OUTPUT
            echo "status_validate=${STATUS_VALIDATE:-Unknown}" >> $GITHUB_OUTPUT

            # 실패 단계 추출
            if [ "${{ steps.status.outputs.status }}" != "Succeeded" ]; then
               ERROR_STEP=$(echo "$EVENTS" | jq -r '.[] | select(.status=="Failed") | .lifecycleEventName' || echo "")
               echo "error_step=${ERROR_STEP:-}" >> $GITHUB_OUTPUT
            else
               echo "error_step=" >> $GITHUB_OUTPUT
            fi
          else
            echo "status_download=Unknown" >> $GITHUB_OUTPUT
            echo "status_app_start=Unknown" >> $GITHUB_OUTPUT
            echo "status_validate=Unknown" >> $GITHUB_OUTPUT
            echo "error_step=" >> $GITHUB_OUTPUT
          fi

  # Discord 알림
  notify-discord:
    runs-on: ubuntu-22.04
    needs: [ first-approval, second-approval, deploy-production ]
    if: ${{ always() && (github.ref_name == 'main' ) }}
    steps:
      - name: Discord 배포 결과 알림
        if: needs.deploy-production.result == 'success' || needs.deploy-production.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ needs.deploy-production.result == 'success' && 'success' || 'failure' }}
          title: "🚀 운영 배포 결과 [${{ needs.deploy-production.result == 'success' && '✅성공' || '❌실패' }}]"
          content: '@everyone'
          description: |
            **배포 타입**: 수동 배포 (Manual)
            **환경**: 🚀 운영(PROD)
            **트리거**: ${{ github.actor }}

            **🐳 Docker 이미지**: `${{ inputs.ecr_name }}`
            **🪣 S3 Key**: `BE/${{ github.ref_name }}/${{ inputs.ecr_name }}.zip`
            **🚀 배포 결과**: ${{ needs.deploy-production.outputs.status }}
            **🆔 Deployment ID**: `${{ needs.deploy-production.outputs.deployment_id }}`
            **💬 배포 메모**: ${{ inputs.deployment_comment }}

            **🔍 상세 진행 단계**:
            - 아티팩트 다운로드: ${{ needs.deploy-production.outputs.status_download == 'Succeeded' && '✅' || (needs.deploy-production.outputs.status_download == 'Failed' && '❌' || '⏭️Skip/Wait') }}
            - 새 서비스 실행: ${{ needs.deploy-production.outputs.status_app_start == 'Succeeded' && '✅' || (needs.deploy-production.outputs.status_app_start == 'Failed' && '❌' || '⏭️Skip/Wait') }}
            - 검증/전환/종료: ${{ needs.deploy-production.outputs.status_validate == 'Succeeded' && '✅' || (needs.deploy-production.outputs.status_validate == 'Failed' && '❌' || '⏭️Skip/Wait') }}

            ${{ needs.deploy-production.outputs.error_step != '' && format('**⚠️ 실패 단계**: {0}', needs.deploy-production.outputs.error_step) || '' }}
            ${{ needs.deploy-production.outputs.error_message != '' && format('**❌ 에러 메시지**: {0}', needs.deploy-production.outputs.error_message) || '' }}

            **🔗 링크**: [워크플로우 확인하기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: "${{ needs.deploy-production.result == 'success' && 65280 || 16711680 }}"
          username: GitHub BE Prod Deploy Bot
          avatar_url: ${{ env.DISCORD_AVATAR_URL }}

      - name: Discord 취소 알림
        if: |
          needs.first-approval.result == 'cancelled' ||
          needs.second-approval.result == 'cancelled' ||
          needs.deploy-production.result == 'cancelled'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: 'cancelled'
          title: '⚠️ 운영 배포 취소됨'
          content: '@everyone'
          description: |
            **배포 타입**: 수동 배포 (Manual)
            **환경**: 🚀 운영(PROD)
            **취소자**: ${{ github.actor }}

            **🐳 Docker 이미지**: `${{ inputs.ecr_name }}`
            **🪣 S3 Key**: `BE/${{ github.ref_name }}/${{ inputs.ecr_name }}.zip`
            **💬 배포 메모**: ${{ inputs.deployment_comment }}

            **취소 단계**:
            - 1차 승인: ${{ needs.first-approval.result }}
            - 2차 승인: ${{ needs.second-approval.result }}
            - 배포 실행: ${{ needs.deploy-production.result }}

            **사유**: 워크플로우가 승인 대기 중 또는 배포 중에 취소되었습니다.

            **🔗 링크**: [워크플로우 확인하기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: 16776960
          username: GitHub BE Prod Deploy Bot
          avatar_url: ${{ env.DISCORD_AVATAR_URL }}
