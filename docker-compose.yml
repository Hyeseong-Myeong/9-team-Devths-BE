services:
  # 백엔드 애플리케이션
  devths-be:
    image: ${FULL_IMAGE}
    container_name: devths-be
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '8080:8080'
    volumes:
      - ${LOG_FILE_DIRECTORY}:/app/log
    networks:
      - devths-network
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8080/actuator/health' ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # 로그 관련 사이드카
  promtail:
    image: grafana/promtail:latest
    container_name: devths-be-promtail
    restart: unless-stopped
    environment:
      - LOKI_URL=${LOKI_URL}
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - ${LOG_FILE_DIRECTORY}:/app/log:ro
    command: -config.file=/etc/promtail/config.yml --config.expand-env=true
    networks:
      - devths-network
    healthcheck:
      test: [ 'CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:9080/ready' ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '2'

networks:
  devths-network:
    driver: bridge
